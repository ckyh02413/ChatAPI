<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ChatAPI</title>
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- auth screen -->
        <div id="auth-screen">
            <div class="auth-box">
                <h1>ChatAPI</h1>

                <!-- login form -->
                <div id="login-form">
                    <p class="subtitle">Sign in to continue</p>
                    <div class="form-group">
                        <label>Username</label>
                        <input
                            type="text"
                            id="login-username"
                            placeholder="Enter username"
                        />
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input
                            type="password"
                            id="login-password"
                            placeholder="Enter password"
                        />
                    </div>
                    <button class="auth-btn" onclick="login()">Sign in</button>
                    <p class="auth-switch">
                        Don't have an account?
                        <span onclick="showRegister()">Register</span>
                    </p>
                    <p class="auth-error" id="login-error"></p>
                </div>

                <!-- register form -->
                <div id="register-form" style="display: none">
                    <p class="subtitle">Create your account</p>
                    <div class="form-group">
                        <label>Username</label>
                        <input
                            type="text"
                            id="reg-username"
                            placeholder="Choose a username"
                        />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input
                            type="email"
                            id="reg-mail"
                            placeholder="Enter your email"
                        />
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input
                            type="password"
                            id="reg-password"
                            placeholder="Choose a password"
                        />
                    </div>
                    <button class="auth-btn" onclick="register()">
                        Create account
                    </button>
                    <p class="auth-switch">
                        Already have an account?
                        <span onclick="showLogin()">Sign in</span>
                    </p>
                    <p class="auth-error" id="reg-error"></p>
                </div>
            </div>
        </div>

        <!-- chat screen -->
        <div id="chat-screen">
            <div class="chat-layout">
                <!-- sidebar -->
                <div class="sidebar">
                    <div class="sidebar-header">
                        <h2>ChatAPI</h2>
                        <div class="room-create">
                            <input
                                type="text"
                                id="room-name-input"
                                placeholder="New room..."
                            />
                            <button onclick="createRoom()">+</button>
                        </div>
                    </div>
                    <div class="room-list" id="room-list"></div>
                    <div class="sidebar-footer">
                        <div class="user-info">
                            <div class="user-avatar" id="user-avatar"></div>
                            <span class="user-name" id="user-name"></span>
                        </div>
                        <button class="logout-btn" onclick="logout()">
                            logout
                        </button>
                    </div>
                </div>

                <!-- main chat -->
                <div class="chat-main">
                    <div class="chat-empty" id="chat-empty">
                        Select a room to start chatting
                    </div>

                    <div id="chat-active" style="display: none">
                        <div class="chat-header">
                            <h3 id="chat-room-name"># general</h3>
                            <span
                                class="chat-header .msg-count"
                                id="msg-count"
                            ></span>
                        </div>
                        <div class="chat-messages" id="chat-messages"></div>
                        <div class="chat-input">
                            <input
                                type="text"
                                id="msg-input"
                                placeholder="Type a message..."
                                onkeydown="
                                    if (event.key === 'Enter') sendMessage();
                                "
                            />
                            <button onclick="sendMessage()">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="scripts.js"></script>
    </body>
</html>
